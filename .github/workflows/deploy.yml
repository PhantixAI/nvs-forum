name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Rebuild Discourse
    runs-on: self-hosted

    steps:
      - name: Build new image (site stays up during this step)
        run: cd /var/discourse && sudo ./launcher bootstrap app

      - name: Swap container (brief downtime ~30s)
        run: |
          cd /var/discourse
          sudo ./launcher destroy app
          sudo ./launcher start app

      - name: Wait for nginx and apply multisite fix
        run: |
          until sudo docker exec app sv status nginx | grep -q "^run:"; do
            echo "Waiting for nginx to start..."; sleep 5
          done
          sudo docker exec app bash -c '
            sed -i "/http_host != /,/^}/d" /usr/local/bin/configure-ssl
            /usr/local/bin/configure-ssl
            sv reload nginx
          '

      - name: Verify all sites are up
        run: |
          for site in navodians.com nitians.in iitians.in; do
            until curl -sk -o /dev/null -w "%{http_code}" https://$site/ | grep -q "200"; do
              echo "Waiting for $site..."; sleep 5
            done
            echo "$site is up"
          done
