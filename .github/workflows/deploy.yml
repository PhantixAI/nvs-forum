name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Rebuild Discourse
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Write app.yml with secrets
        env:
          NVS_GITHUB_PAT: ${{ secrets.NVS_GITHUB_PAT }}
          DISCOURSE_DB_PASSWORD: ${{ secrets.DISCOURSE_DB_PASSWORD }}
          DISCOURSE_SMTP_USERNAME: ${{ secrets.DISCOURSE_SMTP_USERNAME }}
          DISCOURSE_SMTP_PASSWORD: ${{ secrets.DISCOURSE_SMTP_PASSWORD }}
          DISCOURSE_S3_ACCESS_KEY_ID: ${{ secrets.DISCOURSE_S3_ACCESS_KEY_ID }}
          DISCOURSE_S3_SECRET_ACCESS_KEY: ${{ secrets.DISCOURSE_S3_SECRET_ACCESS_KEY }}
        run: |
          python3 - << 'PYEOF' > /tmp/discourse_app.yml
          import os, sys
          content = open('containers/app.yml').read()
          for placeholder, envvar in [
              ('<GITHUB_PAT>', 'NVS_GITHUB_PAT'),
              ('<DISCOURSE_DB_PASSWORD>', 'DISCOURSE_DB_PASSWORD'),
              ('<DISCOURSE_SMTP_USERNAME>', 'DISCOURSE_SMTP_USERNAME'),
              ('<DISCOURSE_SMTP_PASSWORD>', 'DISCOURSE_SMTP_PASSWORD'),
              ('<DISCOURSE_S3_ACCESS_KEY_ID>', 'DISCOURSE_S3_ACCESS_KEY_ID'),
              ('<DISCOURSE_S3_SECRET_ACCESS_KEY>', 'DISCOURSE_S3_SECRET_ACCESS_KEY'),
          ]:
              content = content.replace(placeholder, os.environ[envvar])
          sys.stdout.write(content)
          PYEOF
          sudo cp /tmp/discourse_app.yml /var/discourse/containers/app.yml
          rm /tmp/discourse_app.yml

      - name: Write multisite.yml with secrets
        env:
          DISCOURSE_DB_PASSWORD: ${{ secrets.DISCOURSE_DB_PASSWORD }}
        run: |
          python3 - << 'PYEOF' | sudo tee /var/discourse/shared/standalone/multisite.yml > /dev/null
          import os, sys
          content = open('config/multisite.yml').read()
          content = content.replace('<DISCOURSE_DB_PASSWORD>', os.environ['DISCOURSE_DB_PASSWORD'])
          sys.stdout.write(content)
          PYEOF

      - name: Build new image (site stays up during this step)
        run: cd /var/discourse && sudo ./launcher bootstrap app

      - name: Swap container (brief downtime ~30s)
        run: |
          cd /var/discourse
          sudo ./launcher destroy app
          sudo ./launcher start app

      - name: Wait for nginx and apply multisite fix
        run: |
          until sudo docker exec app sv status nginx | grep -q "^run:"; do
            echo "Waiting for nginx to start..."; sleep 5
          done
          sudo docker exec app bash -c '
            sed -i "/http_host != /,/^}/d" /usr/local/bin/configure-ssl
            /usr/local/bin/configure-ssl
            sv reload nginx
          '

      - name: Verify all sites are up
        run: |
          for site in navodians.com nitians.in iitians.in; do
            until curl -sk -o /dev/null -w "%{http_code}" https://$site/ | grep -q "200"; do
              echo "Waiting for $site..."; sleep 5
            done
            echo "$site is up"
          done
