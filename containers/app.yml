templates:
  ## PostgreSQL is external (RDS) — do NOT include postgres.template.yml
  - "templates/redis.template.yml"
  - "templates/web.template.yml"
  - "templates/web.ratelimited.template.yml"
  - "templates/web.ssl.template.yml"
  - "templates/web.letsencrypt.ssl.template.yml"

expose:
  - "80:80"
  - "443:443"

volumes:
  - volume:
      host: /var/discourse/shared/standalone
      guest: /shared
  - volume:
      host: /var/discourse/shared/standalone/log/var-log
      guest: /var/log
  - volume:
      host: /var/discourse/shared/standalone/multisite.yml
      guest: /var/www/discourse/config/multisite.yml

params:
  db_default_text_search_config: "pg_catalog.english"
  db_shared_buffers: "128MB"
  db_work_mem: "10MB"
  version: master
  ## Replace <GITHUB_PAT> with a fine-grained token (Contents: read-only) for PhantixAI/nvs-forum
  git_url: https://oauth2:<GITHUB_PAT>@github.com/PhantixAI/nvs-forum.git

env:
  LANG: en_US.UTF-8
  ## 2 workers for 2 GB RAM instance
  UNICORN_WORKERS: 2

  ## ===== DISCOURSE BASE =====
  DISCOURSE_HOSTNAME: navodians.com
  DISCOURSE_HOSTNAME_ALIASES: www.navodians.com,nitians.in,www.nitians.in
  DISCOURSE_DEVELOPER_EMAILS: 'support@navodians.com'

  ## ===== EXTERNAL RDS POSTGRESQL =====
  DISCOURSE_DB_USERNAME: navodian_admin
  DISCOURSE_DB_PASSWORD: '<DB_PASSWORD>'
  DISCOURSE_DB_HOST: navodians-pg15.cdey8w2mceyp.ap-south-1.rds.amazonaws.com
  DISCOURSE_DB_PORT: 5432
  DISCOURSE_DB_NAME: discourse
  DISCOURSE_DB_BACKUP_PORT: 5432

  ## ===== AMAZON SES SMTP =====
  DISCOURSE_SMTP_ADDRESS: email-smtp.ap-south-1.amazonaws.com
  DISCOURSE_SMTP_PORT: 587
  DISCOURSE_SMTP_USER_NAME: '<SES_SMTP_USERNAME>'
  DISCOURSE_SMTP_PASSWORD: '<SES_SMTP_PASSWORD>'
  DISCOURSE_SMTP_AUTHENTICATION: login
  DISCOURSE_SMTP_ENABLE_START_TLS: true
  DISCOURSE_SMTP_DOMAIN: navodians.com
  ## Per-site notification_email is set in each site's DB (site_settings table)
  ## Do NOT set DISCOURSE_NOTIFICATION_EMAIL here — it would override all sites globally

  ## ===== LET'S ENCRYPT =====
  LETSENCRYPT_ACCOUNT_EMAIL: support@navodians.com

  ## ===== S3 + CLOUDFRONT =====
  DISCOURSE_USE_S3: true
  DISCOURSE_S3_REGION: ap-south-1
  DISCOURSE_S3_ACCESS_KEY_ID: '<S3_ACCESS_KEY_ID>'
  DISCOURSE_S3_SECRET_ACCESS_KEY: '<S3_SECRET_ACCESS_KEY>'
  DISCOURSE_S3_BUCKET: navodians-forum-uploads
  DISCOURSE_S3_BACKUP_BUCKET: navodians-forum-backups
  DISCOURSE_BACKUP_LOCATION: s3
  DISCOURSE_S3_USE_ACLS: false
  DISCOURSE_S3_CDN_URL: https://cdn.navodians.com
  DISCOURSE_CDN_URL: ""

hooks:
  after_code:
    - exec:
        cd: $home/plugins
        cmd:
          - git clone https://oauth2:<GITHUB_PAT>@github.com/PhantixAI/nvs-follow.git
          - git clone https://oauth2:<GITHUB_PAT>@github.com/PhantixAI/nvs-fontawesome-pro.git

run:
  - exec: echo "Beginning of custom commands"
  ## Multisite nginx fix: write script to file (avoids shell $-interpolation), then run it.
  ## Removes single-site redirect from 20-https.conf; writes per-domain www→apex redirects
  ## to a separate 25-multisite.conf that configure-letsencrypt never touches.
  - file:
      path: /usr/local/bin/multisite-nginx-fix
      contents: |
        #!/usr/bin/env python3
        import re, sys

        conf = '/etc/nginx/conf.d/outlets/server/20-https.conf'
        with open(conf) as f:
            c = f.read()

        # Remove the single-site "if ($http_host != navodians.com)" redirect block
        c = re.sub(
            r'if \(\$http_host != navodians\.com\) \{\s*rewrite[^\n]+\n\}\n?',
            '',
            c,
        )
        with open(conf, 'w') as f:
            f.write(c)

        # Write per-domain www->apex redirects to a separate outlet file
        with open('/etc/nginx/conf.d/outlets/server/25-multisite.conf', 'w') as f:
            f.write(
                'if ($http_host = "www.navodians.com") {\n'
                '  return 301 https://navodians.com$request_uri;\n'
                '}\n'
                'if ($http_host = "www.nitians.in") {\n'
                '  return 301 https://nitians.in$request_uri;\n'
                '}\n'
            )

        print('nginx multisite redirect configured')
      chmod: "+x"
  - exec: /usr/local/bin/multisite-nginx-fix
  - exec: echo "End of custom commands"
